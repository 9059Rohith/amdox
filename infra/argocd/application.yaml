apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: amdox-erp-production
  namespace: argocd
  annotations:
    notifications.argoproj.io/subscribe.on-sync-succeeded.slack: deployments
    notifications.argoproj.io/subscribe.on-sync-failed.slack: alerts
spec:
  project: default
  source:
    repoURL: https://github.com/amdoxtech/amdox-erp
    targetRevision: main
    path: infra/helm/amdox-erp
    helm:
      valueFiles:
        - values.yaml
        - values.production.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: amdox-erp
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  revisionHistoryLimit: 10
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: amdox-erp-staging
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/amdoxtech/amdox-erp
    targetRevision: develop
    path: infra/helm/amdox-erp
    helm:
      valueFiles:
        - values.yaml
        - values.staging.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: amdox-erp-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
